name: Auto‑update Gallery

on:
  push:
    paths:
      - 'images/uploads/**'
  workflow_dispatch:   # <-- this adds the manual button

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate gallery data
        run: |
          echo "heading: IRCNA Gallery" > _data/gallery.yml
          echo "intro: Images from the field, events, and community submissions." >> _data/gallery.yml
          echo "images:" >> _data/gallery.yml
          for img in images/uploads/*.{jpg,jpeg,png,gif,webp}; do
            [ -f "$img" ] || continue
            echo "  - image: /$img" >> _data/gallery.yml
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/gallery.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto‑update gallery list"
            git push
          fi
