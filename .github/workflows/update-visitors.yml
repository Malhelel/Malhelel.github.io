name: Auto-increment Visitor Count

on:
  schedule:
    - cron: '0 */10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-visitors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest changes (force)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main

      - name: Update visitor count
        run: |
          FILE="_data/stats.yml"
          CURRENT=$(grep -oP 'visitors:\s*\K\d+' "$FILE" || echo 0)
          RAND=$(( RANDOM % 17 + 11 ))
          NEW=$(( CURRENT + RAND ))
          sed -i "s/^visitors: .*/visitors: $NEW/" "$FILE"
          echo "RAND=$RAND" >> $GITHUB_ENV
          echo "Updated visitors from $CURRENT to $NEW (+$RAND)"

      - name: Commit and push
        run: |
          git add _data/stats.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update visitors: +${{ env.RAND }}"
            git push origin main --force
          fi
