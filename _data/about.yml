heading: About IRCNA
body: |-
  Independent Reporting and Community Networking in Armenia (IRCNA) is a community‑funded, non‑profit newsroom dedicated to independent, English‑language journalism from Armenia.

  We believe that people living the story should help tell it. Our reporting covers the community, breaking events, festivals, and everyday realities that don't always make headlines. IRCNA is funded entirely by its community, not by political parties or corporate owners.

  **Founder & Journalist:** Mikael Yamiosei  
  **Contact:** Mikael.Yamiosei@gmail.com  
  **Location:** Yerevan, Armenia
