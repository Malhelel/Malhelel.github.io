heading: Commenting & Posting Policy
body: |-
  **<h2>Commenting & Posting Policy</h2>**

  **<p><strong>Last updated:</strong> June 27, 2026</p>**

  **<p>IRCNA is an independent, non-partisan platform. By posting a comment or submitting user-generated content (UGC), you agree to abide by this policy, which works in tandem with the IRCNA Terms of Service and any applicable Partnership Agreements.</p>**

  **<h3>1. Standards of Conduct</h3>**

  **<ul>**

      **<li><strong>No Hate Speech or Discrimination:</strong> We do not tolerate attacks based on race, ethnicity, religion, gender, sexual orientation, disability, or any other protected characteristic.</li>**

      **<li><strong>No Harassment or Personal Attacks:</strong> Criticize ideas, not people. Deliberate targeting of individuals with abusive or unwanted messages is prohibited.</li>**

      **<li><strong>No Profanity or Obscene Content:</strong> Keep language civil. Vulgar or sexually explicit material will be removed.</li>**

      **<li><strong>No Spam or Self-Promotion:</strong> Comments must be relevant to the discussion. Unsolicited commercial messages are prohibited.</li>**

      **<li><strong>No Politics Policy:</strong> IRCNA is a non-partisan, civic-focused platform. Comments or posts that serve as political campaigning, advocacy, or partisan ideological proselytizing are prohibited.</li>**

      **<li><strong>Legal Compliance:</strong> Content must not violate Armenian law or international legal standards, including threats or incitement to violence.</li>**

  **</ul>**

  **<h3>2. Moderation and Enforcement</h3>**

  **<ul>**

      **<li>IRCNA reserves the right to review, edit, or remove any comment or UGC at any time and for any reason.</li>**

      **<li>Repeated violations of this policy may result in the suspension or permanent banning of your account without notice.</li>**

      **<li>If you encounter content that violates these rules, please report it to <strong>Mikael.Yamiosei@gmail.com</strong>.</li>**

  **</ul>**

  **<h3>3. Disclaimer and Liability</h3>**

  **<ul>**

      **<li><strong>Non-Endorsement:</strong> The views expressed in user content are those of the individual authors and do not reflect the position of IRCNA.</li>**

      **<li><strong>Limitation of Liability:</strong> IRCNA disclaims any and all liability for damages resulting from user-generated content, including defamatory or illegal material posted by third parties.</li>**

      **<li><strong>Governance:</strong> This policy is governed by and shall be read in conjunction with the broader IRCNA Terms and Conditions and any applicable Partnership Agreements. In the event of a conflict, the terms of specific signed agreements shall take precedence.</li>**

  **</ul>**

  **<h3>4. Changes to Policy</h3>**

  **<p>IRCNA may update this policy periodically. Continued use of the site or your subscriber account after changes are posted constitutes acceptance of the updated policy.</p>**
