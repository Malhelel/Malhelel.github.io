heading: "Commenting & Posting Policy"
body: |
  **Last updated: June 27, 2026**

  IRCNA welcomes open discussion, but we expect all participants to treat each other with respect. This policy applies to all comments on articles and any other interactive features of the site.

  ### Rules for Commenting and Posting

  By posting a comment or submitting user‑generated content, you agree to follow these rules:

  - **No hate speech or discrimination.** Do not attack or demean others based on race, ethnicity, religion, gender, sexual orientation, disability, or any other protected characteristic.
  - **No harassment or personal attacks.** Criticise ideas, not people. Deliberately targeting individuals with repeated, unwanted, or abusive messages is not allowed.
  - **No profanity or obscene content.** Keep language civil. Excessively vulgar or sexually explicit material will be removed.
  - **No spam, advertising, or self‑promotion.** Comments should be relevant to the discussion. Unsolicited commercial messages or repetitive posts will be deleted.
  - **No illegal content.** Do not post anything that violates Armenian law or international legal standards, including incitement to violence or threats.
  - **No impersonation or doxxing.** Do not pretend to be someone else, and never share another person’s private information without their consent.

  ### Moderation and Enforcement

  IRCNA reserves the right, but not the obligation, to review, edit, or remove any comment or user‑submitted content at any time and for any reason. Accounts that repeatedly violate these rules may be suspended or permanently banned without notice.

  Comments are pre‑moderated or post‑moderated at IRCNA’s discretion. If you see a comment that you believe violates these rules, please report it to **[Mikael.Yamiosei@gmail.com](mailto:Mikael.Yamiosei@gmail.com)**.

  ### Disclaimer

  The views and opinions expressed in comments and user‑submitted content are those of the individual authors and do not reflect the official position of IRCNA. IRCNA does not endorse any user‑generated content and is not responsible for its accuracy.

  ### Changes to This Policy

  IRCNA may update this policy from time to time. The latest version will always be available on this page. Continued use of the site after changes are posted constitutes acceptance of the updated policy.
