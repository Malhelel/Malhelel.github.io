heading: Community Connections and Networking
intro: |-
  # COMMUNITY CONNECTIONS AND NETWORKING

  <strong>Our Philosophy: People First, Stories Second</strong><br>
  IRCNA was founded on a simple belief: people living the story should be able to help tell it. But before any story is told, there must be a community worth telling stories about. This page is not about journalism — it is about the living, breathing network of people, organisations, small businesses, and mutual support systems that make up the fabric of Armenian life. Whether you are looking for a local organisation to collaborate with, a small business to support, or simply a reminder that you are not alone in the work of building a better community, this is your space.

  <details open>
  <summary><strong>1.1 Why Community Matters</strong></summary>

  Community is not an abstract concept in Armenia. It is baked into the culture — from the centuries‑old tradition of <em>zoubara</em>, where entire villages would gather to help a neighbour build a home or harvest a field, to the modern <em>shirkets</em>, women‑led mutual support circles that have fostered resilience from refugee camps in Lebanon to neighbourhoods in Yerevan. These traditions remind us that survival and success are collective, not individual.

  In today's Armenia, community means displaced families from Artsakh finding new livelihoods through entrepreneurship programmes supported by organisations like <a href="https://www.caritas.eu/finding-hope-and-dignity-in-armenia/">Armenian Caritas</a>. It means the women of the <a href="https://armenia.un.org/hy/node/283655">"Berd Bean" Women's Association</a> in Tavush pooling their harvests and their strength to reach markets they could never access alone. It means the young Armenians of the <a href="http://diaspora.gov.am/en/news/1490">Diaspora Youth Ambassador</a> programme returning to their communities around the world to build bridges between the homeland and its global family. IRCNA exists within this ecosystem, not above it.
  </details>

  <details>
  <summary><strong>1.2 What You Will Find Here</strong></summary>

  This page serves as a living directory and gathering point for community resources across Armenia and the Armenian world. Here you can discover:

  - <strong>Past and Upcoming Community Events</strong>: A rolling archive of gatherings, workshops, fairs, cultural celebrations, and volunteer opportunities that have brought communities together. Whether you missed an event and want to see what happened, or you are looking ahead to what is coming next, this is where those memories and opportunities live.
  - <strong>Community Organisations and NGOs</strong>: Grassroots groups doing essential work on the ground — from the <a href="https://rightsindevelopment.org/fr/member/centre-for-community-mobilization-and-support-ngo-ccms/">Centre for Community Mobilization and Support (CCMS)</a> in Lori, which trains citizens in environmental and human rights advocacy, to <a href="https://am.linkedin.com/company/impacthubyerevan">Impact Hub Yerevan</a>, a social innovation space supporting changemakers and social enterprises across the capital.
  - <strong>Small Businesses and Local Enterprises</strong>: Independent shops, family bakeries, artisan workshops, and startups that form the economic backbone of Armenian communities. Organisations such as the <a href="http://icarmenia.am/news/new-members-of-the-sme-development-council/">2B Business Support Foundation</a> work with over 900 micro and small businesses annually, while platforms like <a href="https://newsroom.aua.am/2024/02/19/epic-empowers-armenias-startup-ecosystem-with-globally-connected-startup-huddle/">Startup Huddle Yerevan</a> connect entrepreneurs with mentors, investors, and each other.
  - <strong>Mutual Aid and Support Networks</strong>: Informal groups and formal programmes that provide food, shelter, medical care, legal assistance, and psychological support to vulnerable individuals and families. These networks operate on the principle that everyone deserves dignity, and they rely on community participation to function.
  - <strong>Diaspora Connections</strong>: Links to organisations and initiatives that connect Armenians across borders — from the <a href="https://armenpress.am/en/article/1248562">"iGorts" fellowship programme</a> bringing diaspora professionals into Armenia's public sector, to youth camps and cultural exchanges that keep the global Armenian identity alive and thriving.
  </details>

  <details>
  <summary><strong>1.3 How to Use This Page</strong></summary>

  Browse the listings below to find organisations, businesses, and events that align with your interests or needs. If you represent a community organisation, small business, or mutual aid network and would like to be listed here, use the <strong>Submit a Tip or Information</strong> form in the <a href="/submit-events/">Reach Out To Us</a> section of the sidebar. IRCNA does not charge for listings — this page exists to serve the community, not to profit from it.
  </details>

  <details>
  <summary><strong>1.4 A Living Resource</strong></summary>

  This page will grow as the community grows. New organisations will be added. Past events will be archived. Small businesses will be featured. It is not a static directory — it is a reflection of a community in motion. IRCNA's role is to amplify that motion, to make sure the people doing the work are seen, and to ensure that anyone looking for connection can find it here.
  </details>

  ---

  <em>To submit a community organisation, small business, or event for inclusion on this page, please use the <a href="/submit-events/">Submit Upcoming Events</a> form or contact <strong>Mikael.Yamiosei@gmail.com</strong>.</em>

