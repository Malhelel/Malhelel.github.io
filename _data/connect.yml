heading: "Connect with IRCNA"
intro: |
  **Become a subscriber and join the community.**  
  As a subscriber you can:  
  • Leave comments on articles  
  • Opt in to our newsletter for updates  
  • In the future, when you donate 1,000 AMD or more, you’ll gain the ability to post your own text‑based stories directly on IRCNA.  

  **Rules:**  
  • No hate speech, discrimination, or harassment  
  • No profanity or obscene content  
  • Respect others’ opinions; we encourage healthy debate  
  • Follow Armenian law and international human rights principles  

  Ready to join? Fill out the form below — it only takes a minute.
