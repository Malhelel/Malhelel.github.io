heading: Content Removal & Accreditation Inquiries
body: |-
  # SECTION I — CONTENT REMOVAL & CORRECTION INQUIRIES

  <strong>1.1 Purpose</strong><br>

  IRCNA is committed to accuracy, fairness, and transparency. This page explains how individuals and organisations may request the removal, correction, or modification of content published on this website, the steps IRCNA will take upon receiving such a request, the possible outcomes, and the principles that guide our decisions. It also outlines the rights of IRCNA's journalists in the context of content disputes.

  <strong>1.2 How to Submit a Content Removal or Correction Request</strong><br>

  Requests for content removal, correction, or modification should be submitted by email to <strong>Mikael.Yamiosei@gmail.com</strong>. To ensure efficient review, your request must include:

  - <strong>Your full name and contact information</strong> (email address and, optionally, telephone number and physical address). Anonymous requests are accepted but may be more difficult to investigate and resolve

  - <strong>The exact URL(s) of the content in question</strong>. Please copy and paste the full web address of each article, image, or page you wish to reference

  - <strong>A clear and specific description of the concern</strong>. State exactly what you believe is inaccurate, defamatory, infringing, or otherwise objectionable, and why

  - <strong>Supporting evidence</strong>. Provide documents, links, photographs, or other materials that support your claim. For factual inaccuracies, please indicate the correct information and the source of that information

  - <strong>A statement of the remedy you are seeking</strong>. Indicate whether you are requesting a correction, a retraction, removal of specific content, or another form of relief

  IRCNA will acknowledge receipt of all properly submitted requests within <strong>five (5) business days</strong>.

  <strong>1.3 What Happens After You Submit a Request</strong><br>

  Upon receiving a complete content removal or correction request, IRCNA will follow this process:

  1. <strong>Acknowledgement</strong>: You will receive an email confirming that your request has been received and is under review

  2. <strong>Preliminary Review</strong>: IRCNA's editorial leadership will conduct an initial assessment to determine whether the request falls within the scope of this policy and contains sufficient information to proceed

  3. <strong>Investigation</strong>: If the request proceeds, IRCNA will investigate the matter. This may include reviewing the original reporting, consulting with the journalist(s) involved, examining the evidence you have provided, and, where appropriate, consulting legal counsel or independent expert bodies such as the <a href="https://idcarmenia.am/en/">Information Disputes Council (IDC) of Armenia</a>

  4. <strong>Decision</strong>: IRCNA will make a decision based on the facts, applicable law, and the principles outlined in this policy

  5. <strong>Response</strong>: You will be notified of the decision in writing, including the reasoning behind it. Substantive responses will be provided within <strong>fifteen (15) business days</strong> of acknowledgement. Complex cases may require additional time, in which case you will be informed of the delay and given an estimated response date

  <strong>1.4 Possible Outcomes</strong><br>

  Depending on the circumstances of your request and the outcome of IRCNA's review, one or more of the following actions may be taken:

  - <strong>Correction</strong>: If factual inaccuracies are confirmed, IRCNA will correct the error in the affected article and place a clear correction notice at the top or bottom of the article, indicating what was changed and when

  - <strong>Clarification or Editor's Note</strong>: If the content is factually accurate but may benefit from additional context, a clarification or editor's note may be appended to the article

  - <strong>Right of Reply</strong>: In cases where a person or organisation has been the subject of critical reporting and raises a substantive dispute, IRCNA may offer the opportunity to publish a response or counterstatement, which will be clearly labelled as such

  - <strong>Partial Removal or Redaction</strong>: In limited circumstances, IRCNA may remove or redact specific portions of an article while preserving the remainder, for example if a single sentence contains an error that cannot be corrected without altering the article's integrity

  - <strong>Full Removal</strong>: Full removal of content is an exceptional measure. It will be considered only where the content is found to be unlawful, poses a demonstrable and imminent risk of serious harm, or where continued publication would violate fundamental rights to a degree that outweighs the public interest in access to the information

  - <strong>Declination</strong>: IRCNA may decline to act on a request if, after review, the content is found to be accurate, protected by freedom of expression, or not in violation of any applicable law or IRCNA policy

  <strong>1.5 When IRCNA Will NOT Remove Content</strong><br>

  IRCNA is guided by the principle that freedom of expression and the public's right to information are fundamental to democratic society. IRCNA will generally decline to remove content in the following circumstances:

  - <strong>The content is factually accurate</strong>. Truth is a complete defence to claims of defamation under the <a href="https://www.arlis.am/DocumentView.aspx?DocID=82344">Civil Code of the Republic of Armenia</a>. If the content at issue is true, it will not be removed

  - <strong>The content expresses an opinion or value judgment</strong>. Statements of opinion based on disclosed facts, as distinct from statements of fact, are protected by freedom of expression and generally cannot form the basis of a defamation claim

  - <strong>The content concerns a matter of public interest</strong>. Reporting on matters of public concern — including the conduct of public officials, government policy, public health, the environment, and other issues affecting the community — is afforded strong protection under Armenian and international law

  - <strong>The content is protected fair comment or criticism</strong>. Legitimate criticism of public figures, institutions, and matters of public debate is a cornerstone of press freedom

  - <strong>The request seeks to suppress legitimate reporting</strong>. IRCNA will not remove content solely because it is unfavourable or embarrassing to a person or organisation, or because the subject of the reporting disagrees with its conclusions

  - <strong>The content is archived and of historical or public record value</strong>. IRCNA believes in the preservation of the public record. Even where an article is superseded by subsequent events, the original reporting may remain accessible as part of the historical record, with appropriate notes where necessary

  - <strong>The request does not meet legal requirements</strong>. If the request does not establish a valid legal basis for removal under applicable law, IRCNA will decline to act

  <strong>1.6 Transparency of Actions</strong><br>

  Whenever IRCNA takes action on a content removal or correction request — whether by correction, clarification, partial removal, or full removal — the action will be transparently noted on the affected page, including the date of the action and the nature of the change. Where content is removed in full, a placeholder note may be published indicating that content was removed and the reason for removal, unless doing so would cause further harm.

  <strong>1.7 Journalists' Rights in Content Disputes</strong><br>

  IRCNA's journalists operate under the protection of the following rights and legal frameworks:

  - <strong>Constitutional Protection</strong>: The <a href="https://www.president.am/en/constitution-2015/">Constitution of the Republic of Armenia</a> guarantees freedom of speech and freedom of the press, including the right to seek, receive, and disseminate information and ideas through any media

  - <strong>Statutory Protection</strong>: Under the <a href="https://www.arlis.am/DocumentView.aspx?DocID=164521">Republic of Armenia Law on Mass Communication</a>, a journalist is a person performing a social duty. Hindrance to the lawful professional activities of a journalist, or forcing a journalist to disseminate or not disseminate information, is punishable by criminal penalties including fines, correctional labour, or imprisonment

  - <strong>Source Protection</strong>: IRCNA is committed to protecting the confidentiality of its sources. While Armenian law does not currently provide a statutory journalist's privilege exempting journalists from compelled testimony, IRCNA will use all available legal means to protect source identity and resist compelled disclosure

  - <strong>Protection Against Strategic Lawsuits</strong>: IRCNA recognises that content removal requests and legal threats may be used as tools to intimidate journalists and suppress legitimate reporting. IRCNA will not capitulate to pressure intended to undermine editorial independence. Where appropriate, IRCNA will seek legal support and collaborate with press freedom organisations to defend its journalists

  - <strong>Editorial Independence</strong>: All editorial decisions — including whether to publish, correct, or remove content — rest exclusively with IRCNA's editorial leadership. No external party, including advertisers, donors, state bodies, or complainants, has the right to dictate editorial decisions

  <strong>1.8 Legal Recourse for Complainants</strong><br>

  If a complainant is dissatisfied with IRCNA's response to a content removal or correction request, they may pursue the following external avenues:

  - <strong>Information Disputes Council (IDC)</strong>: The <a href="https://idcarmenia.am/en/">IDC of Armenia</a> is an independent expert body that issues professional, non‑binding opinions on information disputes involving media. IRCNA respects the work of the IDC and will give serious consideration to its opinions

  - <strong>Civil Courts</strong>: Complainants may initiate defamation or other civil proceedings in the courts of the Republic of Armenia. Defamation is a civil matter; it was decriminalised in Armenia in 2010. Under the Civil Code, courts may order a retraction for defamatory content, but generally cannot require the removal of entire articles from websites

  - <strong>Press Council or Professional Bodies</strong>: Complainants may raise concerns with professional journalism bodies where applicable

  IRCNA encourages complainants to use the internal review process described in this policy before pursuing external remedies.

  <strong>1.9 Time Limits</strong><br>

  While IRCNA does not impose a strict time limit on content removal or correction requests, prompt reporting of concerns is encouraged. Delays in reporting may affect IRCNA's ability to investigate and resolve the matter, as sources, records, and recollections may become less accessible over time.

  ---

  # SECTION II — CREDIT & ACCREDITATION INQUIRIES

  <strong>2.1 Purpose</strong><br>

  IRCNA values the contributions of all individuals whose work appears on this platform — journalists, photographers, sources, and community members. This section explains how to request proper credit or accreditation for content published on the IRCNA website where credit was omitted, incomplete, or incorrect.

  <strong>2.2 When Credit May Be Missing or Incorrect</strong><br>

  Despite IRCNA's commitment to proper attribution, errors or omissions may occur. Common scenarios include:

  - A photograph or illustration was published without a photographer credit

  - A community‑submitted story or tip was published without naming the contributor

  - A journalist's byline was inadvertently omitted or misspelled

  - Content was republished from a partner organisation without proper attribution

  - A quote or excerpt was used without sufficient identification of the original source

  <strong>2.3 How to Request Credit or Accreditation</strong><br>

  If you believe that you or someone you represent is entitled to credit or attribution for content published on IRCNA, and such credit is missing, incomplete, or incorrect, please submit a request to <strong>Mikael.Yamiosei@gmail.com</strong>. Your request should include:

  - <strong>Your full name and contact information</strong>

  - <strong>A description of the content in question</strong>, including the exact URL(s) where it appears

  - <strong>Your relationship to the content</strong> (e.g., photographer, author, source, interviewee)

  - <strong>The credit or attribution you believe should be applied</strong> (e.g., "Photo by [Your Name]," "Reporting contributed by [Your Name]")

  - <strong>Any supporting evidence</strong> (e.g., original files, correspondence, publication records)

  <strong>2.4 What Happens After You Submit a Credit Request</strong><br>

  Upon receiving a credit request:

  1. IRCNA will acknowledge receipt within <strong>five (5) business days</strong>

  2. IRCNA will verify the claim, which may include reviewing original files, correspondence, and publication records, and consulting with the journalist or editor involved

  3. If the claim is verified, IRCNA will add or correct the credit on the affected content within <strong>ten (10) business days</strong> of verification

  4. You will be notified when the credit has been updated

  <strong>2.5 Possible Outcomes</strong><br>

  Depending on the outcome of IRCNA's review:

  - <strong>Credit Added</strong>: If credit was missing, the appropriate attribution will be added to the content (e.g., byline, photo credit, contributor note)

  - <strong>Credit Corrected</strong>: If credit was present but incorrect or incomplete, it will be updated to reflect the accurate information

  - <strong>Request Declined</strong>: IRCNA may decline the request if the evidence does not support the claim, or if the content was properly attributed under applicable standards at the time of publication

  <strong>2.6 Accreditation and Credentials</strong><br>

  For inquiries related to journalist accreditation, press credentials, or verification of IRCNA's organisational status, please refer to the <a href="/legal/">IRCNA Legal Page, Section 1.2</a>. For inquiries about independent journalist applications, please use the <a href="/apply/">Apply to Join IRCNA</a> form.

  <strong>2.7 Contact for Credit and Accreditation Inquiries</strong><br>

  All credit, attribution, and accreditation inquiries should be directed to:

  <strong>Mikael Yamiosei</strong><br>

  Founder & Journalist, IRCNA<br>

  Email: Mikael.Yamiosei@gmail.com<br>

  Location: Yerevan, Armenia

