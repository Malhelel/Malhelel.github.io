heading: IRCNA Content and Usage Disclaimer
body: |-
  # **Preamble & Foundational Principles**

  IRCNA (Independent Reporting and Community Networking in Armenia) operates in strict adherence to the fundamental rights guaranteeing freedom of expression and press freedom. These are enshrined in **_Article 42 of the Constitution of the Republic of Armenia_**, which guarantees the right to freely express opinion, as well as to seek, receive, and disseminate information and ideas through any media without interference and regardless of state frontiers.

  This right is reinforced by **_Article 10 of the European Convention on Human Rights_**, which protects the right to hold opinions and to receive and impart information without interference by public authority, while also recognizing that the exercise of these freedoms carries duties and responsibilities. Furthermore, IRCNA’s operations align with the principles outlined in the **_European Media Freedom Act (Regulation (EU) 2024/1083)_** , which establishes a common framework to safeguard media pluralism and editorial independence.

  IRCNA operates as a non-profit entity, permitted under the **_RA Law on Non-Governmental Organizations (Law No. HO-268)_**, which guarantees the right to establish and operate public organizations on a non-profit basis. As a community-driven, nonpartisan platform, IRCNA champions the right of the public to be adequately informed on matters of public interest.

  # **Journalist Accountability**

  IRCNA serves as a platform for independent journalists and community contributors. We champion editorial independence, and in this spirit, each journalist or content partner operating under the IRCNA banner is solely accountable for their own work, including the accuracy of reporting and the expression of any opinion. IRCNA holds no institutional authority over the editorial process of independent contributors, whose autonomy is protected by the principles of media freedom and is consistent with the statutory protections against interference in editorial policies and decisions outlined in the **_European Media Freedom Act_**.

  However, to maintain public trust, IRCNA requires all contributors to adhere to core journalistic ethics: never publishing information known to be inaccurate, clearly distinguishing between fact and opinion, and providing subjects a right of reply. IRCNA reserves the right to review content, to provide editorial input in good faith, and to remove contributions that violate these core ethical standards or that fall outside the scope of our mission.

  # **General Content Disclaimer**

  All content published on IRCNA platforms (including our website, social media channels, and multimedia content) is for informational and public interest purposes only. IRCNA and its contributors are committed to factual accuracy and fairness; however, we make no representations or warranties, express or implied, regarding the completeness, accuracy, or reliability of any content.

  The opinions, views, and values expressed in any article, commentary, or multimedia content are exclusively those of the individual author(s) and do not necessarily reflect the official policy or position of IRCNA as an organization.

  In line with our mission, content on IRCNA platforms is not intended to demean, insult, spread misinformation, slander, or lie about any particular person, group, entity, or government. We reject the publication of material likely to spark hatred or discrimination on the grounds of a person's age, gender, race, religion, disability, or sexual orientation. Any expression made as part of our reporting—including criticism, assumptions, or value judgments on matters of public interest—is protected to the fullest extent permissible under **_Article 10 of the European Convention on Human Rights_**, which applies particularly to political speech and debate.

  We are vigilant against the dissemination of disinformation. IRCNA does not participate in the public dissemination of false factual information about a person that would defame them, nor public expressions made with the sole intent to humiliate, consistent with the definitions of defamation and insult under the **_Civil Code of the Republic of Armenia (Article 1087.1)_**.

  # **Third-Party Links & Embedded Content**

  IRCNA content may contain links to external websites, embedded multimedia, or references to third-party information. IRCNA exercises no control over the nature, content, and availability of these external sources. The inclusion of any links does not necessarily imply a recommendation or endorse the views expressed within them. **We are not responsible for the content or practices of any third-party sites**.

  # **Intellectual Property**

  Unless otherwise stated, IRCNA and/or its licensors own the intellectual property rights for all original material on our platforms. You may view, download, and print pages or content for your personal, non-commercial use, subject to the restrictions set out below. 

  You must **not**:

  · Republish, reproduce, duplicate, or copy material for a commercial purpose without our express written consent.

  · Edit or otherwise modify any material.

  · Redistribute material from IRCNA without proper and prominent attribution to IRCNA and the original author.

  For content submitted by independent journalists and partners, the intellectual property rights remain with the original creator unless otherwise agreed upon in writing. By submitting content to IRCNA, contributors grant IRCNA a non-exclusive, worldwide, royalty-free license to publish, reproduce, and distribute the content across its platforms.

  # **Governing Law & Corrections**

  This Disclaimer shall be governed by and interpreted in accordance with the laws of the Republic of Armenia and relevant international instruments to which Armenia is a signatory. Any disputes arising in connection with it shall be subject to the exclusive jurisdiction of the courts of Armenia.

  IRCNA is committed to the principle that inaccurate assertions must be quickly and transparently corrected. If you believe any content we have published is factually incorrect or violates this disclaimer, please contact us immediately at [insert designated editorial email address], and we will promptly investigate and, where warranted, issue a correction or retraction.

  Last Updated: 22/05/2026
