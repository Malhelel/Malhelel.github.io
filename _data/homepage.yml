sidebar_mini_1_image: /images/uploads/SnapInsta.to_703242289_17951329932168707_6722119970252286324_n.jpg
sidebar_mini_1_text: COP17 IS COMING TO YEREVAN
sidebar_mini_2_image: /images/uploads/SnapInsta.to_710307471_17953337979168707_4581547593378447302_n.jpg
sidebar_mini_2_text: |-
  <strong>EXLUSIVE INTERVIEW | MARY BADALYAN | WINE DAYS</strong>

  Ahead of the 10th Annual Yerevan Wine Days Festival, IRCNA reached out to the organizers of the Yerevan wine days event to ask a few questions about what we can expect from this years events - and the response did not disappoint. Scroll through to hear what they have in store for this year. All questioned answered by Mary Badalyan, Co-founder if the Eventtoura: Event tourism Development Foundation. For any or all questions DM or email IRCNA. In depth preview article on what to except for this years Wine Days Festival, and how it compares to past ones, can be found <a href="https://malhelel.github.io/2026/06/03/yerevan-wine-days-2026.html">here</a>. This post was curated by Mikael Yamiosei for IRCNA
