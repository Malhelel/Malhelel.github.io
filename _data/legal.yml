  # SECTION III — TERMS & CONDITIONS

  <strong>3.1 Acceptance of Terms</strong><br>

  By accessing and using the IRCNA website (hereinafter “the Site”), you agree to be bound by these Terms and Conditions. If you do not agree, you should not use the Site.

  <strong>3.2 Nature of the Service</strong><br>

  IRCNA is an independent, non‑profit news and community networking platform. The Site provides news reporting, analysis, community information, and related content. IRCNA does not provide professional advice of any kind — legal, financial, medical, or otherwise. Any reliance on information published on the Site is at your own risk.

  <strong>3.3 Accuracy and Corrections</strong><br>

  IRCNA strives for accuracy in all reporting. However, news is a continuous process of gathering and verifying information. Facts may evolve as new information becomes available. IRCNA will correct material errors promptly and transparently. If you identify a potential error, please contact us using the procedure in Section 2.4.

  <strong>3.4 Disclaimer of Warranties</strong><br>

  The Site and its content are provided “as is” without warranties of any kind, either express or implied. IRCNA does not warrant that:

  - The Site will be available uninterrupted or error‑free

  - The content is complete, accurate, or current at all times

  - The Site is free from viruses, malware, or other harmful components

  To the fullest extent permitted by law, IRCNA disclaims all warranties, express or implied.

  <strong>3.5 Limitation of Liability</strong><br>

  To the fullest extent permitted by applicable law, IRCNA and its founder, journalists, contributors, and affiliates shall not be liable for any direct, indirect, incidental, consequential, special, or punitive damages arising from or related to:

  - Use of or inability to use the Site

  - Reliance on any content published on the Site

  - Any third‑party content, links, or embedded media

  - Any errors, omissions, or inaccuracies in published content

  This limitation applies regardless of the legal theory on which the claim is based, including negligence, contract, or otherwise, and even if IRCNA has been advised of the possibility of such damages.

  <strong>3.6 User Conduct</strong><br>

  Users of the Site agree not to:

  - Use the Site for any unlawful purpose

  - Post, transmit, or submit content that is defamatory, obscene, threatening, harassing, or otherwise objectionable

  - Impersonate any person or entity

  - Attempt to gain unauthorised access to any part of the Site

  - Use the Site to distribute spam, malware, or other harmful content

  - Violate any applicable local, national, or international law

  IRCNA reserves the right to block or restrict access to any user who violates these terms.

  <strong>3.7 User‑Generated Content and Community Submissions</strong><br>

  Sections of the Site may allow users to submit content, comments, tips, or other materials. By submitting content, you grant IRCNA the rights described in Section 2.9. You are solely responsible for the content you submit. IRCNA reserves the right, but not the obligation, to review, edit, or remove user‑submitted content at its sole discretion.

  <strong>3.8 Intellectual Property Rights</strong><br>

  All IRCNA branding, including the name “Independent Reporting and Community Networking in Armenia,” the IRCNA logo, and related trade names, are the intellectual property of IRCNA and may not be used without permission. Content licensing terms are set out in Section 2.6.

  <strong>3.9 Changes to These Terms</strong><br>

  IRCNA reserves the right to modify these Terms and Conditions at any time. Changes will be effective immediately upon posting to the Site. Continued use of the Site after any such changes constitutes acceptance of the new terms. Users are encouraged to review this page periodically.

  <strong>3.10 Severability</strong><br>

  If any provision of these Terms and Conditions is found to be invalid, illegal, or unenforceable by a court of competent jurisdiction, the remaining provisions shall continue in full force and effect.

  <strong>3.11 Governing Law and Jurisdiction</strong><br>

  These Terms and Conditions are governed by and construed in accordance with the laws of the Republic of Armenia. Any disputes arising from or related to these terms shall be subject to the exclusive jurisdiction of the courts of the Republic of Armenia.

  <strong>3.12 Contact</strong><br>

  For questions, concerns, or legal inquiries regarding these Terms and Conditions, contact:

  <strong>Mikael Yamiosei</strong><br>

  Founder & Journalist, IRCNA<br>

  Email: Mikael.Yamiosei@gmail.com<br>

  Location: Yerevan, Armenia

