  # SECTION I — CERTIFICATIONS

  <strong>1.1 Organisational Status</strong><br>

  Independent Reporting and Community Networking in Armenia (IRCNA) is a non‑profit press organisation and community initiative founded and operated by Mikael Yamiosei, Journalist. IRCNA operates in accordance with the <a href="https://www.president.am/en/constitution-2015/">Constitution of the Republic of Armenia</a> which guarantees freedom of the press, radio, television and other means of information, and guarantees the activities of independent public television and radio offering diversity of informational, educational, cultural and entertainment programmes.

  Under the Republic of Armenia <a href="https://www.arlis.am/DocumentView.aspx?DocID=164521">Law “On Mass Communication”</a>, media products are produced and disseminated without prior or current state registration, licensing, declaration, or notice to any state body. IRCNA exercises this right fully. Entities engaged in communications activity and journalists operate freely in compliance with the principles of equality, legitimacy, freedom of speech (expression), and pluralism. A journalist, as a person performing a social duty, is protected by the legislation of the Republic of Armenia while conducting legitimate professional activities.

  <strong>1.2 Journalist Certification</strong><br>

  Mikael Yamiosei is the founding journalist of IRCNA and bears full editorial responsibility for all content published on this site. In accordance with Armenian press practice, accreditation to cover state bodies such as the National Assembly is available to journalists representing media outlets registered with the Ministry of Justice, provided the outlet meets circulation or visitor thresholds defined by the relevant state body. IRCNA maintains the standards required for such accreditation and will seek formal accreditation for its journalists as the organisation expands.

  <strong>1.3 Editorial Independence</strong><br>

  IRCNA is editorially and functionally independent from any Member State, political party, third country, or entity controlled or financed by a third country. IRCNA does not provide content generated by artificial intelligence systems without subjecting it to human review or editorial control. All published content reflects the independent editorial judgement of IRCNA's journalists.

  <strong>1.4 Values and Ethical Standards</strong><br>

  IRCNA adheres to the following core principles:

  - <strong>Unbiased Reporting</strong>: Facts are reported from the ground, verified against multiple sources, and told without fear or favour. IRCNA answers only to its community — not to political parties, oligarchs, or foreign agendas.

  - <strong>Community Connection</strong>: Journalism begins by listening. Community tips, perspectives, and on‑the‑ground voices directly shape coverage. This is a relationship built on mutual trust.

  - <strong>Giving Armenians a Voice</strong>: IRCNA amplifies the voices of ordinary people — residents of Yerevan neighbourhoods, villagers in the regions, and diaspora members — ensuring their experiences, struggles, and hopes are part of the public record.

  - <strong>Supporting Independent Journalism</strong>: IRCNA is community‑funded, powered by donations, memberships, and grants rather than advertising or state money. This safeguards editorial freedom.

  - <strong>Transparency</strong>: IRCNA discloses ownership, funding sources, and editorial policies. Public funding and state advertising, if any, are transparently declared.

  ---

  # SECTION II — LEGAL

  <strong>2.1 Governing Law</strong><br>

  IRCNA operates under the laws of the Republic of Armenia. All content published on this site is subject to the <a href="https://www.president.am/en/constitution-2015/">Constitution of Armenia</a>, the <a href="https://www.arlis.am/DocumentView.aspx?DocID=164521">Law on Mass Communication</a>, the <a href="https://www.arlis.am/DocumentView.aspx?DocID=126671">Law on Freedom of Information</a>, the <a href="https://www.arlis.am/DocumentView.aspx?DocID=126679">Law on Copyright and Related Rights</a>, the <a href="https://www.arlis.am/DocumentView.aspx?DocID=82344">Civil Code of the Republic of Armenia</a>, and applicable international treaties to which Armenia is a party, including the <a href="https://www.echr.coe.int/documents/convention_eng.pdf">European Convention for the Protection of Human Rights and Fundamental Freedoms</a>.

  IRCNA additionally recognises and, where applicable to its digital operations, adheres to relevant principles of European Union law, including the <a href="https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32024R1083">European Media Freedom Act (EMFA)</a>, the <a href="https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32022R2065">Digital Services Act (DSA)</a>, and the <a href="https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32016R0679">General Data Protection Regulation (GDPR)</a>. Armenia, as a Council of Europe member state, has committed to aligning its media legislation with European standards.

  <strong>2.2 Freedom of Expression and Press Freedom</strong><br>

  The Constitution of Armenia guarantees that everyone has the right to freedom of expression, including freedom to seek, receive and disseminate information and ideas through any media, without the interference of state or local self‑government bodies and regardless of state frontiers. Freedom of expression may be restricted only by law, for the purpose of state security, protecting public order, health and morals, or the honour and good reputation of others and other basic rights and freedoms.

  Armenia ranked 43rd in the Reporters Without Borders (RSF) Press Freedom Index in 2025 — the highest ranking in the South Caucasus. IRCNA is committed to contributing to and defending this press freedom environment.

  <strong>2.3 Defamation, Libel, and Content Disputes</strong><br>

  Under the <a href="https://www.arlis.am/DocumentView.aspx?DocID=82344">Civil Code of the Republic of Armenia</a>, defamation is defined as the public presentation of factual data about an individual that are untrue and tarnish their honour, dignity, or business reputation. For an expression to constitute defamation, the following conditions must exist simultaneously: factual data about a person must be provided, the factual data must be made public, the factual data presented must not correspond to reality, and the factual data presented must tarnish the person's honour, dignity, or business reputation.

  Insult is defined as a public expression made in order to defame honour, dignity, or business reputation through words, images, sounds, signs, or other means. An expression may not be considered insult if it is based on accurate facts or is based on overriding public interest.

  Defamation and libel were decriminalised in Armenia in 2010. Defamation and insult are civil matters. The burden of proof rests on the respondent in defamation cases.

  IRCNA takes accuracy seriously. If any person or organisation believes that content published by IRCNA is defamatory or inaccurate, they are encouraged to follow the content removal and correction procedure described in Section 2.4 below before initiating legal proceedings.

  <strong>2.4 Content Removal and Correction Policy</strong><br>

  IRCNA is committed to accuracy and fairness. If you believe that content published on this site contains factual inaccuracies, defamatory statements, or material that infringes upon your rights, the following procedure applies:

  1. <strong>Initial Request</strong>: Submit a detailed written request to <strong>Mikael.Yamiosei@gmail.com</strong> specifying:

     - The exact URL(s) of the content in question

     - A clear description of the alleged inaccuracy, defamatory content, or rights infringement

     - Evidence supporting your claim

     - Your full name and contact information

  2. <strong>Review</strong>: IRCNA will review the request promptly and in good faith. IRCNA may consult legal counsel or the Yerevan Press Club Information Disputes Council where appropriate.

  3. <strong>Resolution</strong>: Depending on the outcome of the review, IRCNA may:

     - Correct factual inaccuracies and note the correction on the affected article

     - Publish a refutation or response in cases of substantiated defamation claims

     - Remove content that is found to violate applicable law or IRCNA's editorial standards

     - Decline to act where the content represents value judgments or is protected by freedom of expression

  4. <strong>Transparency</strong>: Any correction, retraction, or removal action taken by IRCNA will be transparently noted on the affected page, including the date of the action and the reason.

  The right to request removal or response applies to publications by journalists on online platforms under Armenian law. Courts may order digital platforms and other media to publish a retraction for defamatory content but generally cannot require the takedown of entire articles from websites.

  <strong>2.5 Journalist Rights and Source Protection</strong><br>

  Under Armenian law, journalists are protected as persons performing a public duty while conducting legitimate professional activities. Hindrance to the legal professional activities of a journalist, or forcing a journalist to disseminate or not disseminate information, is punishable by criminal penalties including fines, correctional labour, or imprisonment.

  IRCNA journalists are committed to protecting the confidentiality of their sources. While Armenian law does not currently provide a statutory journalist's privilege exempting journalists from testimony, IRCNA will use all available legal means to protect source confidentiality and resist compelled disclosure of sources.

  <strong>2.6 Intellectual Property and Copyright</strong><br>

  All original content published by IRCNA — including articles, photographs, videos, graphics, and other media — is protected under the Republic of Armenia <a href="https://www.arlis.am/DocumentView.aspx?DocID=126679">Law on Copyright and Related Rights</a>, which protects authors, performers, producers, and broadcasters.

  Unless otherwise stated, all IRCNA content is published under a <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/">Creative Commons Attribution‑NonCommercial‑NoDerivatives 4.0 International License (CC BY‑NC‑ND 4.0)</a>. This means:

  - Content may be shared and republished with proper attribution to IRCNA and the author

  - Content may not be used for commercial purposes without explicit permission

  - Content may not be modified, transformed, or built upon

  For commercial licensing, syndication, or other permissions, contact <strong>Mikael.Yamiosei@gmail.com</strong>.

  Third‑party content — including images obtained from stock services, embedded social media content, and content from partner organisations — remains the property of its respective owners and is used by IRCNA in accordance with applicable licences or fair use principles.

  <strong>2.7 Privacy and Data Protection</strong><br>

  IRCNA respects the privacy of its readers, sources, and community members. This site does not collect personal data beyond what is necessary for its operation:

  - <strong>Contact Forms</strong>: Information submitted through IRCNA's contact, story submission, and application forms is used solely for the purpose of responding to the inquiry or processing the submission. Data is not sold, shared with third parties, or used for marketing.

  - <strong>Analytics</strong>: IRCNA may use privacy‑respecting analytics to understand readership. No personal identifiers are collected or stored.

  - <strong>Cookies</strong>: This site uses minimal cookies essential for functionality. No tracking cookies or advertising cookies are deployed.

  - <strong>Embedded Content</strong>: Pages may contain embedded content from third‑party platforms (e.g., YouTube, social media). These platforms may collect data in accordance with their own privacy policies.

  For any privacy‑related inquiries, contact <strong>Mikael.Yamiosei@gmail.com</strong>.

  <strong>2.8 Third‑Party Links and Embedded Content</strong><br>

  This site may contain links to external websites and embedded content from third‑party platforms. IRCNA does not endorse, control, or assume responsibility for the content, privacy policies, or practices of any third‑party sites. Users access external links at their own risk.

  <strong>2.9 Community Journalism and Public Participation</strong><br>

  IRCNA operates on a community networking model. Readers, community members, and independent journalists may submit tips, story ideas, photographs, videos, and other content. By submitting content to IRCNA, submitters:

  - Grant IRCNA a non‑exclusive, royalty‑free licence to publish, distribute, and archive the submitted content

  - Warrant that the content is their own original work or that they have obtained all necessary permissions

  - Acknowledge that IRCNA retains editorial discretion over whether and how to use submitted content

  - Agree that IRCNA may edit submitted content for clarity, accuracy, and style, consistent with journalistic standards

  IRCNA does not guarantee publication of any submitted content.

