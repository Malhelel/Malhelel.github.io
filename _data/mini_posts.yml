  - title: YEREVAN RAVES FOR AFROJACK
    description: |-
      On May 16, Yerevan’s Republic Square became something it rarely is: a free, open-air dance floor. The occasion was Youth and Student Day, and the city marked it with a massive music festival headlined by Grammy-winning Dutch DJ Afrojack. From 17:00 to 23:00, thousands gathered at the foot of the National Gallery as electronic beats echoed off the pink stone walls of the capital’s most iconic square. The event, named Zil Dzzen (Զիլ Ձեն) — literally “Loud Sound” — was organized by Armenia’s Tourism Committee and produced by the creative collective Rambalkoshe, a local art-music platform known for turning unconventional spaces into immersive audiovisual experiences. For six hours, the heart of the city belonged to its youth — no tickets, no barriers, just a community coming together in sound. 🎵🇦🇲

      #yerevanrave #yerevanafrojack #afrojack #zildzzen #raveyerevan
