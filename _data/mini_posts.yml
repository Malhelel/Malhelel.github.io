---
title: Mini Posts
permalink: /mini-posts/
---
<!DOCTYPE HTML>
<html>
<head>
	<base href="/">
	<title>Mini Posts – IRCNA</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<style>
		/* carousel base */
		.carousel { position: relative; overflow: hidden; width: 100%; aspect-ratio: 16/10; }
		.carousel .slides { display: flex; scroll-snap-type: x mandatory; overflow-x: auto; scroll-behavior: smooth; }
		.carousel .slides img { scroll-snap-align: start; flex: none; width: 100%; object-fit: cover; }
		.carousel .arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; padding: 0.5em; text-decoration: none; z-index: 10; }
		.carousel .arrow.left { left: 0; }
		.carousel .arrow.right { right: 0; }
		/* lightbox */
		.lightbox { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index:9999; text-align:center; }
		.lightbox:target { display:block; }
		.lightbox img { max-width:90%; max-height:90%; margin-top:2%; }
		.lightbox .close { position:absolute; top:20px; right:40px; color:white; font-size:40px; text-decoration:none; }
	</style>
</head>
<body class="is-preload">
<div id="wrapper">
<div id="main">
<div class="inner">

	<header id="header">
		<a href="index.html" class="logo">
			{% if site.data.homepage.logo_image %}
				<img src="{{ site.data.homepage.logo_image }}" alt="IRCNA logo" style="height:40px; vertical-align:middle; margin-right:10px;" />
			{% endif %}
			<strong>{{ site.data.homepage.sidebar_slogan }}</strong> in Armenia
		</a>
		{{ site.data.homepage.social_icons_html }}
	</header>

	<section>
		<header class="major"><h1>Mini Posts</h1></header>
		<div class="posts">
			{% for post in site.data.mini_posts %}
			<article>
				<!-- carousel -->
				<div class="carousel">
					{% if post.images.size > 1 %}
					<a href="#slide-{{ forloop.index }}-{{ forloop.parentloop.index }}-next" class="arrow left">&#10094;</a>
					<a href="#slide-{{ forloop.index }}-{{ forloop.parentloop.index }}-prev" class="arrow right">&#10095;</a>
					{% endif %}
					<div class="slides" id="slides-{{ forloop.index }}">
						{% for img in post.images %}
						<img id="slide-{{ forloop.index }}-{{ forloop.parentloop.index }}" src="{{ img }}" alt="{{ post.title }}" />
						{% endfor %}
					</div>
				</div>
				<h3>{{ post.title }}</h3>
				<p>{{ post.description }}</p>
				<!-- lightbox links for each image -->
				{% for img in post.images %}
				<a href="#lightbox-{{ forloop.parentloop.index }}-{{ forloop.index }}">View full size</a>
				{% endfor %}
			</article>
			{% endfor %}
		</div>
	</section>

</div>
</div>

<div id="sidebar">
<div class="inner">
	<section id="search" class="alt">
		<form method="get" action="search.html"><input type="text" name="q" placeholder="Search" /></form>
	</section>
	<nav id="menu">
		<header class="major"><h2>Menu</h2></header>
		{{ site.data.homepage.menu_html }}
	</nav>
	<footer id="footer"><p class="copyright">{{ site.data.homepage.footer_text }}</p></footer>
</div>
</div>
</div>

<!-- lightbox overlays -->
{% for post in site.data.mini_posts %}
  {% for img in post.images %}
  <div id="lightbox-{{ forloop.parentloop.index }}-{{ forloop.index }}" class="lightbox">
    <a href="#" class="close">&times;</a>
    <img src="{{ img }}" alt="{{ post.title }}" />
  </div>
  {% endfor %}
{% endfor %}

<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/browser.min.js"></script>
<script src="assets/js/breakpoints.min.js"></script>
<script src="assets/js/util.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
