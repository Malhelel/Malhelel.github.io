title: COP17 IS COMING TO YEREVAN
description: |-
  In October 2026, Armenia will host one of the world’s most important environmental gatherings — and for the first time, it’s happening in Yerevan. 🇦🇲

  COP17 is the UN Biodiversity Conference, where nearly 200 countries meet to negotiate the future of the planet’s ecosystems, species, and genetic diversity. Armenia isn’t just providing the venue — it holds the presidency and will guide these negotiations.

  Swipe through to understand:
  ➡️ What COP17 actually is
  ➡️ Why Armenia was chosen
  ➡️ The Leaders’ Summit before the conference
  ➡️ What’s at stake — for the world and for Armenia
  ➡️ The state of global progress (and the gaps)
  ➡️ Key issues that will define the negotiations
  ➡️ Armenia’s own biodiversity commitments
  ➡️ How IRCNA will cover it all

  This is the kind of story IRCNA was built for: complex, consequential, and too often reported without local context. We’re preparing months of coverage — and we want your questions to shape it.

  What do you want to understand about COP17? What worries you about Armenia’s environment? Drop it in the comments or send a voice note to our tip line. Your curiosity becomes our coverage.

  📩 Signal: Mikael.yamiosei@gmail.com
  🔗 More resources at: Malhelel.github.io/contact

  #COP17 #Yerevan #Biodiversity #CBDCOP17 #leadersfornature
