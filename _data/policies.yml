heading: Content / Privacy / Inquiry Policies
body: |-
  # SECTION I — CONTENT USAGE POLICY

  <strong>1.1 Purpose and Scope</strong><br>

  This Content Usage Policy governs how readers, publishers, and third parties may access, share, and republish content produced by Independent Reporting and Community Networking in Armenia (IRCNA). It applies to all original content published on this website, including articles, photographs, videos, graphics, audio recordings, and other media.

  <strong>1.2 Creative Commons Licensing</strong><br>

  Unless otherwise stated, all original IRCNA content is published under a <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/">Creative Commons Attribution‑NonCommercial‑NoDerivatives 4.0 International License (CC BY‑NC‑ND 4.0)</a>. Under this licence, you are free to:

  - <strong>Share</strong> — copy and redistribute the material in any medium or format

  - <strong>Attribution</strong> — you must give appropriate credit to IRCNA and the original author, provide a link to the licence, and indicate if changes were made. You may do so in any reasonable manner, but not in any way that suggests IRCNA endorses you or your use

  - <strong>Non‑Commercial</strong> — you may not use the material for commercial purposes without explicit physically written prior permission

  - <strong>No Derivatives</strong> — if you remix, transform, or build upon the material, you may NOT distribute the modified material

  <strong>1.3 Attribution Requirements</strong><br>

  When republishing or sharing IRCNA content, attribution must include:

  - The name of the author (if credited)

  - The name "IRCNA" or "Independent Reporting and Community Networking in Armenia"

  - A hyperlink to the original article on this website

  - The title of the original work

  - A notation that the content is published under CC BY‑NC‑ND 4.0

  <strong>1.4 Commercial Licensing and Syndication</strong><br>

  For commercial licensing, syndication, or any use beyond the scope of the CC BY‑NC‑ND 4.0 licence, please contact <strong>Mikael.Yamiosei@gmail.com</strong>. IRCNA reserves the right to negotiate separate licensing terms for commercial use, including but not limited to republication in paid publications, broadcast media, and advertising.

  <strong>1.5 Third‑Party Content</strong><br>

  Some content appearing on this website — including embedded social media posts, stock photography, partner content, and user‑submitted materials — is not owned by IRCNA and is used under licence, fair use, or with permission from the respective rights holders. Such content is clearly attributed where possible and remains the property of its original owners. IRCNA makes no claim of ownership over third‑party content and does not grant any licence for its reuse.

  <strong>1.6 User‑Submitted Content</strong><br>

  IRCNA welcomes tips, story ideas, photographs, videos, and other content from readers and community members. By submitting content to IRCNA, you:

  - Grant IRCNA a non‑exclusive, royalty‑free, worldwide licence to publish, distribute, reproduce, and archive the submitted content across all media

  - Warrant that you are the original creator of the content or have obtained all necessary permissions, licences, and releases from any identifiable individuals, rights holders, or copyright owners

  - Acknowledge that IRCNA retains full editorial discretion over whether and how to use, edit, or remove submitted content

  - Agree that IRCNA may edit submissions for accuracy, clarity, style, and length in accordance with journalistic standards

  - Understand that IRCNA does not guarantee publication and is under no obligation to use or retain any submitted content

  <strong>1.7 Copyright Infringement Notification</strong><br>

  IRCNA respects the intellectual property rights of others. If you believe that any content on this website infringes your copyright, please submit a detailed notice to <strong>Mikael.Yamiosei@gmail.com</strong> containing:

  - A description of the copyrighted work you believe has been infringed

  - The exact URL(s) where the allegedly infringing content is located

  - Your contact information, including name, address, telephone number, and email

  - A statement that you have a good‑faith belief that the disputed use is not authorised by the copyright owner, its agent, or the law

  - A statement, made under penalty of perjury, that the information in your notice is accurate and that you are the copyright owner or authorised to act on the copyright owner's behalf

  IRCNA will review all complete notices and respond in accordance with applicable law.

  <strong>1.8 Corrections Policy</strong><br>

  IRCNA is committed to accuracy. When errors are identified in published content, IRCNA will:

  - Correct the error promptly

  - Place a clear correction notice on the affected article, indicating the nature of the error and the correction made

  - For significant errors, publish a separate correction or editor's note

  To report an error, contact <strong>Mikael.Yamiosei@gmail.com</strong>. IRCNA reviews all correction requests in good faith.

  ---

  # SECTION II — PRIVACY POLICY

  <strong>2.1 Introduction and Scope</strong><br>

  IRCNA respects your privacy. This Privacy Policy explains how personal information is collected, used, stored, and protected when you visit this website or interact with IRCNA's services. It applies to all visitors, readers, sources, and community members.

  IRCNA's privacy practices are guided by the <a href="https://www.arlis.am/DocumentView.aspx?DocID=126781">Republic of Armenia Law on Protection of Personal Data</a>, adopted in 2015 and amended in 2023, which establishes the principles of lawful, fair, and transparent processing of personal data. IRCNA also voluntarily adheres to the principles of the <a href="https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32016R0679">EU General Data Protection Regulation (GDPR)</a> where applicable to its digital operations.

  <strong>2.2 What Information IRCNA Collects</strong><br>

  IRCNA is designed to collect minimal personal data. Specifically:

  - <strong>Contact Forms</strong>: When you submit a message through IRCNA's contact, story submission, application, or tip forms, IRCNA collects the information you provide — which may include your name, email address, phone number, and the content of your message. This information is used solely to respond to your inquiry or process your submission

  - <strong>Email Communications</strong>: If you correspond with IRCNA by email, IRCNA retains your email address and correspondence history for reference and record‑keeping

  - <strong>Automatically Collected Data</strong>: Like most websites, IRCNA's hosting provider may automatically log certain technical information, including your IP address, browser type, operating system, referring pages, and timestamps. This data is used for security and diagnostic purposes only and is not linked to any personal identity

  - <strong>Cookies</strong>: This website uses minimal session cookies essential for basic functionality and security. No advertising cookies, tracking cookies, or third‑party analytics cookies are deployed by IRCNA

  <strong>2.3 What IRCNA Does NOT Collect</strong><br>

  IRCNA does not:

  - Require user accounts or registration for public access

  - Operate a paywall or subscription service

  - Use advertising networks, ad trackers, or marketing pixels

  - Sell, rent, or trade personal data to third parties

  - Collect sensitive personal data (health, biometric, political opinions, etc.)

  - Deploy third‑party analytics that identify individual users

  <strong>2.4 How IRCNA Uses Your Information</strong><br>

  Any personal data collected is used exclusively for the following purposes:

  - Responding to inquiries, tips, and submissions

  - Processing journalist applications

  - Internal record‑keeping and correspondence management

  - Ensuring the security and proper functioning of the website

  - Complying with applicable legal obligations

  IRCNA does not use personal data for marketing, profiling, automated decision‑making, or any purpose beyond those stated above.

  <strong>2.5 Data Retention</strong><br>

  IRCNA retains personal data only for as long as necessary to fulfil the purpose for which it was collected, or as required by applicable law. Correspondence and submission records are generally retained for reference, but may be deleted upon request where no legal or journalistic obligation requires their preservation.

  <strong>2.6 Data Sharing and Third Parties</strong><br>

  IRCNA does not sell, rent, trade, or otherwise disclose your personal data to third parties, except:

  - When required by law, court order, or lawful government request

  - When necessary to protect the rights, safety, or property of IRCNA, its journalists, or the public

  - With your explicit consent

  Third‑party services used by IRCNA — including the website hosting platform (GitHub Pages), form processing services (Tally), and embedded content platforms (YouTube, social media) — may process data in accordance with their own privacy policies. IRCNA does not control and is not responsible for the data practices of these third parties.

  <strong>2.7 Data Security</strong><br>

  IRCNA takes reasonable technical and organisational measures to protect personal data against unauthorised access, alteration, disclosure, or destruction. However, no method of transmission over the internet or electronic storage is completely secure. IRCNA cannot guarantee absolute security but is committed to protecting your information to the best of its ability.

  <strong>2.8 Your Rights</strong><br>

  Under Armenian data protection law, you have the right to:

  - Access your personal data held by IRCNA

  - Request correction of inaccurate or incomplete personal data

  - Request deletion of your personal data, subject to legal and journalistic obligations

  - Withdraw consent to data processing where processing is based on consent

  - Object to processing in certain circumstances

  To exercise any of these rights, contact <strong>Mikael.Yamiosei@gmail.com</strong>. IRCNA will respond to all valid requests within a reasonable timeframe and in accordance with applicable law.

  <strong>2.9 Embedded Content from Other Websites</strong><br>

  Articles on this site may include embedded content (e.g., YouTube videos, social media posts, interactive graphics). Embedded content from other websites behaves as if you visited the other website directly. These websites may collect data about you, use cookies, embed additional third‑party tracking, and monitor your interaction with the embedded content. IRCNA has no control over and assumes no responsibility for the data practices of these external platforms.

  <strong>2.10 Children's Privacy</strong><br>

  IRCNA does not knowingly collect personal data from children under the age of 16. If you believe a child has provided personal data through this website, please contact IRCNA immediately and the information will be removed.

  <strong>2.11 Changes to This Privacy Policy</strong><br>

  IRCNA may update this Privacy Policy from time to time. Changes will be posted on this page with a revised date. Continued use of the website after changes are posted constitutes acceptance of the updated policy.

  ---

  # SECTION III — INQUIRY POLICY

  <strong>3.1 Purpose</strong><br>

  IRCNA values transparency, accountability, and open dialogue with its readers, sources, and the public. This Inquiry Policy explains how to submit questions, complaints, corrections, and other inquiries, and how IRCNA will respond.

  <strong>3.2 Types of Inquiries</strong><br>

  IRCNA accepts the following categories of inquiry:

  - <strong>Corrections</strong>: Reporting factual errors in published content

  - <strong>Complaints</strong>: Raising concerns about editorial standards, accuracy, fairness, or journalistic conduct

  - <strong>Content Removal or Modification Requests</strong>: Requesting the removal, modification, or retraction of published content (see <a href="/legal/">IRCNA Legal Page, Section 2.4</a> for the full content removal procedure)

  - <strong>Source Protection Concerns</strong>: Inquiries related to confidentiality, anonymity, or source protection

  - <strong>General Questions</strong>: Any other questions about IRCNA's reporting, operations, or policies

  <strong>3.3 How to Submit an Inquiry</strong><br>

  All inquiries should be directed to <strong>Mikael.Yamiosei@gmail.com</strong>. Please include:

  - Your full name and contact information

  - The nature of your inquiry (correction, complaint, removal request, etc.)

  - For content‑specific inquiries: the exact URL(s) of the content in question

  - A clear and detailed description of your concern

  - Any supporting evidence or documentation

  Anonymous inquiries are accepted but may limit IRCNA's ability to investigate and respond. IRCNA respects the confidentiality of all correspondents and will not disclose your identity without your consent, except where required by law.

  <strong>3.4 Response Timeline</strong><br>

  IRCNA will acknowledge receipt of all inquiries within <strong>five (5) business days</strong>. Substantive responses will be provided within <strong>fifteen (15) business days</strong>, though complex matters may require additional time. If additional time is needed, IRCNA will notify you and provide an estimated response date.

  <strong>3.5 Corrections and Clarifications</strong><br>

  When a factual error is identified:

  - IRCNA will correct the error in the affected article promptly

  - A clear correction notice will be placed on the article, indicating what was corrected and when

  - For significant errors, a separate editor's note may be published

  - IRCNA maintains an internal record of all corrections for accountability

  If you believe IRCNA has reported inaccurately, you are encouraged to submit a correction request before pursuing other remedies.

  <strong>3.6 Editorial Complaints</strong><br>

  Complaints concerning editorial standards, fairness, balance, or journalistic conduct will be reviewed by IRCNA's editorial leadership. Where a complaint is upheld, IRCNA will take appropriate corrective action, which may include a published clarification, correction, or response. IRCNA will communicate the outcome of the review to the complainant.

  <strong>3.7 Content Removal Requests</strong><br>

  Requests for content removal are evaluated against IRCNA's commitment to freedom of expression, the public's right to information, and applicable legal standards. The full content removal and correction procedure is detailed in <a href="/legal/">IRCNA Legal Page, Section 2.4</a>. In summary:

  - IRCNA will remove content only in exceptional circumstances

  - Courts in Armenia may order digital platforms to publish a retraction for defamatory content but generally cannot require the removal of entire articles from websites

  - IRCNA will comply with lawful court orders

  - Where content is removed or modified, IRCNA will transparently note the action on the affected page

  <strong>3.8 Source Protection and Confidentiality</strong><br>

  IRCNA takes source protection seriously. Inquiries that may implicate source confidentiality will be handled with extreme care. Under Armenian law, journalists are protected as persons performing a public duty while conducting legitimate professional activities, and hindrance to those activities is punishable. IRCNA will resist any attempt to compel disclosure of confidential sources and will use all available legal means to protect source identity.

  <strong>3.9 Transparency Reporting</strong><br>

  IRCNA may periodically publish information about the volume and nature of inquiries received, consistent with its commitment to transparency and accountability. No personally identifiable information will be disclosed in such reports.

  <strong>3.10 Escalation and External Review</strong><br>

  If you are dissatisfied with IRCNA's response to your inquiry, you may seek external review through:

  - The <a href="https://idcarmenia.am/en/">Information Disputes Council (IDC) of Armenia</a>, an independent expert body that issues professional opinions on information disputes involving media

  - The <a href="https://foi.am/en">Freedom of Information Center of Armenia (FOICA)</a>, which provides legal support and advocacy on access to information matters

  - The <a href="https://ypc.am/">Yerevan Press Club</a>, which provides media analysis and defends journalists' rights

  <strong>3.11 Contact for Inquiries</strong><br>

  For all questions, complaints, corrections, or other inquiries, contact:

  <strong>Mikael Yamiosei</strong><br>

  Founder & Journalist, IRCNA<br>

  Email: Mikael.Yamiosei@gmail.com<br>

  Location: Yerevan, Armenia

