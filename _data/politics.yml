  - title: IRCNA POLITICS STATEMENT
    image: /images/uploads/BED0CA91-FC9A-43EA-8420-B1010B6E32BC.png
    description: |-
      <h1>IRCNA Political Reporting & Nonpartisanship Policy</h1>

      <h2>1. Purpose and Scope</h2>

      <p>This document sets forth the official policy of Independent Reporting and Community Networking in Armenia (IRCNA) regarding political reporting, electoral coverage, and our institutional stance on partisanship. It applies to all content published on IRCNA platforms, all individuals operating under the IRCNA banner, and all editorial decisions made in the name of IRCNA. The purpose of this policy is to preserve the integrity of our mission, maintain the trust of our community, and avoid the inherent conflicts that arise when a small, community-driven newsroom attempts to cover party politics fairly and comprehensively.</p>

      <h2>2. IRCNA’s Core Values and Mission</h2>

      <p>IRCNA was founded on the belief that journalism should begin by listening — to communities, to individuals, and to the stories that shape everyday life in Armenia. Our mission is to amplify Armenian voices, report on issues that directly affect people’s lives, and build a network of trust between the public and the press. We are nonpartisan by design. We are not aligned with any political party, candidate, government, or opposition movement. Our loyalty is to the truth, to our community, and to the principles of independent, public-interest journalism.</p>

      <p>These values are not abstract. They govern every decision we make, including the decision to refuse political reporting as a category of coverage. We believe that staying rooted in our own values means choosing clarity over compromise, even when that choice means turning away from certain types of stories.</p>

      <h2>3. The Challenge of Fair Political Coverage</h2>

      <p>Political reporting presents a unique and, for an organization of IRCNA’s size and structure, insurmountable challenge: the obligation to provide every political party, perspective, and candidate a fair and equal platform. In a multiparty democracy like Armenia, where the political landscape is complex and deeply contested, true fairness would require proportional coverage, rigorous balance, and the resources to fact-check and contextualize every statement, claim, and counterclaim across the entire political spectrum.</p>

      <p>We acknowledge openly that this is not something IRCNA can guarantee. Attempting to cover some parties while not covering others, or offering disproportionate attention to any one political group, would betray our commitment to fairness and risk turning our platform into a tool for political advantage — whether intentionally or not. Even the appearance of bias is damaging to the trust we have worked to build with our community.</p>

      <p>Furthermore, no publication can appeal to everyone’s opinions. In the political arena, every story, every angle, and every editorial choice is subject to competing interpretations. We have concluded that the only responsible way to avoid becoming a source of division, misinformation, or perceived partisanship is to avoid political reporting altogether.</p>

      <h2>4. Our Commitment to Nonpartisanship</h2>

      <p>Accordingly, IRCNA does not and will not:</p>

      <ul>
      <li>Report on political parties, party platforms, or internal party dynamics.</li>
      <li>Cover election campaigns, candidates, or electoral processes.</li>
      <li>Publish opinion pieces, editorials, or commentary that endorse, oppose, or evaluate political figures or parties.</li>
      <li>Solicit political commentary from sources, contributors, or members of the public for the purpose of shaping political narratives.</li>
      <li>Provide a platform for political advertising, sponsored political content, or partisan messaging of any kind.</li>
      </ul>

      <p>This commitment is absolute and extends to all IRCNA channels, including our website, social media accounts, newsletters, and video content. It applies equally to the IRCNA founder, any independent journalists partnered with IRCNA, and any volunteers or contributors acting under our name.</p>

      <p>We do not, however, define "political" so broadly as to exclude all discussion of governance, public policy, or civic life. Matters that directly affect the health, safety, rights, and well-being of Armenian communities — such as environmental policy, public health, infrastructure, and human rights — may fall within our reporting scope when they are rooted in community concern and are not framed as partisan debates. In all such cases, our reporting will remain firmly grounded in the experiences of the people affected, not in the positioning of political actors.</p>

      <h2>5. What We Do Instead: Community-First Journalism</h2>

      <p>IRCNA’s decision to abstain from political reporting is not a retreat from journalism; it is a redirection of our energy and resources toward the stories that matter most to the people of Armenia. Our journalism is centered on:</p>

      <ul>
      <li><strong>Local stories</strong> that reflect the daily realities of life in Yerevan and beyond.</li>
      <li><strong>Community voices</strong>, gathered through our tip lines, listening sessions, and direct engagement.</li>
      <li><strong>Breaking news</strong> of public concern, reported accurately and without partisan spin.</li>
      <li><strong>Events, culture, and civic life</strong> that bring Armenians together.</li>
      <li><strong>Accountability reporting</strong> that focuses on issues, systems, and outcomes rather than personalities or party platforms.</li>
      </ul>

      <p>By keeping the community — not politics — at the center of everything we do, we protect our independence and ensure that IRCNA remains a trusted, safe space for all Armenians, regardless of their private political views.</p>

      <h2>6. Editorial Independence and Accountability</h2>

      <p>This policy is an editorial decision made by IRCNA’s founder in service of our mission and our community. It is not imposed by any external funder, government, or partner. We hold ourselves accountable to this policy, and we invite our community to hold us accountable as well. If you believe that any IRCNA content violates the spirit or letter of this commitment, we encourage you to contact us immediately. We will review all concerns promptly and take corrective action where necessary.</p>

      <p>We also recognize that the definition of what constitutes "political" content may evolve over time. This policy will be reviewed periodically and updated as needed, with full transparency to our community regarding any changes.</p>

      <h2>7. Legal and Ethical Foundation</h2>

      <p>This policy is consistent with the legal and ethical frameworks that govern IRCNA’s operations. Under <strong>Article 42 of the Constitution of the Republic of Armenia</strong> and <strong>Article 10 of the European Convention on Human Rights</strong>, freedom of expression includes the right of media organizations to determine their own editorial scope. Our decision not to cover party politics is an exercise of that editorial freedom, not an abridgment of it.</p>

      <p>Ethically, this policy aligns with the principle of journalistic independence enshrined in the codes of conduct of major press organizations worldwide. We believe that independence is not only about who funds you; it is also about the conscious choices you make to avoid becoming entangled in battles that are not your own.</p>

      <h2>8. Contact and Review</h2>

      <p>For questions about this policy, or to report a potential violation, please contact IRCNA at:</p>

      <p><strong>Email:</strong> Mikael.Yamiosei@gmail.com</p>

      <p>This policy was last updated on 30 May 2026. IRCNA reserves the right to amend this policy at any time. Any material changes will be noted on this page and, where appropriate, communicated via our official channels.</p>
