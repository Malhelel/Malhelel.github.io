heading: Subscription & Subscriber Policy
body: |-
  ### IRCNA Subscriber Policy

  **Effective Date:** June 27, 2026

  #### 1. Definitions and Status

  This Policy governs the rights, responsibilities, and status of individuals holding a "Subscriber" account on IRCNA.

  - **Distinction of Status:** A Subscriber account is a distinct status within the IRCNA ecosystem. Subscriber status does not constitute a volunteer position, nor does it confer the title or responsibilities of an IRCNA Journalist, Member, or Partner. These categories are subject to separate governance documents and agreements.

  #### 2. Subscriber Accounts and UGC Privileges

  - **Account Creation:** Subscriber accounts are created manually by the IRCNA administrator. Self-registration is disabled to maintain community integrity.
  - **UGC Privileges:** While all Subscribers may comment on articles, the ability to submit User-Generated Content (UGC) is a tiered privilege.
  - **Donation Requirement:** To unlock UGC submission privileges, a Subscriber must engage in a one-time, non-refundable donation to IRCNA in an amount of no less than 500 AMD. This donation supports independent journalism and does not confer any ownership or employment status.

  #### 3. Newsletter Subscription and Pricing

  - **Independent Subscription:** Becoming a Subscriber does not automatically enroll an individual in the IRCNA newsletter, nor does it grant free access to the newsletter. The newsletter is a separate service.
  - **Standard Pricing:** The standard monthly subscription fee for the IRCNA newsletter is 2,500 AMD.
  - **Registered Subscriber Discount:** Individuals who hold a registered Subscriber account are eligible for a discounted newsletter rate of 800 AMD per month for a duration of 12 months.
  - **Discount Expiration and Reversion:** The 800 AMD discounted rate is contingent upon continuous subscription. If a subscriber cancels their newsletter subscription at any point during the 12-month discounted period:
      - The discount is immediately forfeited.
      - Any subsequent renewal of the newsletter subscription will revert to the standard rate of 2,500 AMD per month.

  #### 4. Financial Policy and Refund Disclaimer

  - **No-Refund Policy:** IRCNA maintains a strict no-refund policy. No fees, donations, or subscription payments are refundable under any circumstances. By finalizing any transaction with IRCNA, you acknowledge and agree that you are not entitled to a refund.
  - **No Financial Promises:** IRCNA does not, will not, and shall never promise to pay, sponsor, reimburse, or provide financial compensation to any subscriber.

  #### 5. Account Termination and Governance

  - **Termination for Cause:** IRCNA reserves the right to suspend or terminate a Subscriber account at any time for violations of the **Commenting & Posting Policy** or any other established IRCNA terms.
  - **Content Retention:** In the event of account termination, IRCNA reserves the right to retain, remove, or continue displaying any content previously submitted by the user.
  - **Governance and Precedence:** This Policy is governed by and shall be read in conjunction with the broader IRCNA Terms and Conditions and any applicable Partnership Agreements. In the event of a conflict, the terms of specific signed agreements shall take precedence.

  #### 6. Policy Updates

  IRCNA reserves the right to modify this Policy at any time. Continued use of your Subscriber account or the IRCNA website after changes are posted constitutes acceptance of the updated Policy.
