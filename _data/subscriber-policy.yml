heading: Subscription & Subscriber Policy
body: |-
  **Last updated: June 27, 2026**

  This policy explains how subscriber accounts work at IRCNA, what benefits they offer, and the terms you agree to when you become a subscriber.

  ### What Is a Subscriber Account?

  A subscriber account is a free account that allows you to:

  - **Comment** on articles
  - **Opt in** to the IRCNA newsletter
  - **Submit user‑generated content** (articles, stories, etc.) once you meet the requirements below

  ### How to Become a Subscriber

  Subscriber accounts are **created manually** by IRCNA. To request an account:

  1. Fill out the sign‑up form on the [**Connect page**](/connect/).
  2. The IRCNA administrator will review your request and create your account.
  3. You will receive a temporary password that you can change after your first login.

  Self‑registration is not available to protect the community from spam and abuse.

  ### User‑Generated Content (UGC) Eligibility

  All subscribers can comment. To gain the ability to **submit your own articles** for publication on IRCNA, you must:

  - Donate a minimum of **500 AMD** to IRCNA.
  - Once your donation is confirmed, your account will be upgraded to allow article submissions.

  Donations are non‑refundable but are used entirely to support independent journalism in Armenia.

  ### Privacy and Display Names

  When you comment or submit content, your **display name** (chosen by you or assigned by the admin) is shown publicly. Your email address is **never displayed** on the site. IRCNA does not sell or share your personal information with third parties. For more details, see our [Privacy Policy](/policies/).

  ### Account Termination

  IRCNA may suspend or terminate your subscriber account at any time if you violate the [**Commenting & Posting Policy**](/commenting-policy/) or any other IRCNA policy. In the event of termination, your previously published content may remain on the site at IRCNA’s discretion.

  ### Changes to This Policy

  IRCNA may update this policy from time to time. The latest version will always be available on this page. Continued use of your subscriber account after changes are posted constitutes acceptance of the updated policy.

  ### Contact

  For questions about your subscriber account, contact [**Mikael.Yamiosei@gmail.com**](mailto:Mikael.Yamiosei@gmail.com).
