heading: COMING SOON TO IRCNA
body: |-
  - <h2>Correction Notice</h2>

  <blockquote style="border-left: 4px solid #e44; margin: 1.5em 0; padding: 0.8em 1.2em; background: #fafafa;">

  <strong>Editor’s Note – 31 May 2026:</strong> IRCNA initially published incorrect dates for Yerevan Wine Days 2026 in our preview article and related posts. The dates were originally listed as <strong>6, 7, and 8 June</strong>. The correct dates of the festival are <strong>5, 6, and 7 June 2026</strong>. All affected content has been updated with the accurate information.

  <br><br>

  We regret this error and apologize for any confusion it may have caused. IRCNA is committed to factual accuracy and transparency, and we correct mistakes promptly when they occur. If you believe any IRCNA content contains an inaccuracy, please contact us at <strong>Mikael.Yamiosei@gmail.com</strong>.

  </blockquote>


  ![](/images/uploads/winedaysupd.png)

