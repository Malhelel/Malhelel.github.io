heading: 'PLEASE BE SURE TO READ THE ANOUNCEMENT BELOW:'
body: |-
  - June 15 | Three Articles on Wine Days Festival's 10th Year
  Recap Article - Wine & Gastronomic Businesses Article - Local Experience
  - <h2>Notice of Hiatus</h2>

  <blockquote style="border-left: 4px solid #e44; margin: 1.5em 0; padding: 0.8em 1.2em; background: #fafaf;">

  <strong>important Notice – 7th June2026: </strong>A Note from IRCNA – Wine Days Coverage & a Short Pause

  Yerevan Wine Days 2026 has officially come to a close, and what a festival it was. Over the past three days, I’ve spoken with winemakers, chefs, festival organisers, and countless attendees. I’ve gathered a substantial amount of material spanning wine, gastronomy, local business, tourism, and the on‑the‑ground community experience — far more than one article can hold.

  Because of the sheer depth of the reporting I’ve done, I’ve made the decision to delay the main Wine Days article to June 15th. In its place, I will publish three separate articles, released consecutively:

  1. Wine Days Recap – a comprehensive overview of the festival’s tenth edition.
  2. Wine & Gastronomic Business – the entrepreneurs, trends, and economic impact behind the stalls.
  3. A Local on‑the‑ground Perspective – the festival as experienced by Armenians and visitors themselves.

  Each of these deserves the time, attention, and responsible journalism that IRCNA was built to deliver. Rushing them out wouldn’t be fair to the people who shared their stories, or to you.

  I also want to remind our readers that

   IRCNA is, and always has been, a single independent journalist — me, Mikael. Every interview, every photograph, every word you see here is researched, written, and curated by one person, without staff or institutional backing. That independence is IRCNA’s greatest strength, but it also means there are moments when I have to stop, breathe, and give the work the care it demands.

  With that in mind, IRCNA will be going on a short hiatus after these three articles are published. The articles you’re waiting for will still be released on schedule, but no new content will be produced until further notice. I’ll be using this time to rest, reflect, and return with the same energy and curiosity that started this project.

  Thank you — truly — for reading, for sharing, for sending tips, and for trusting this tiny newsroom. Your support has made IRCNA possible, and I wish you the very best while I’m away. I’ll see you again soon.

  I regret this delay, but promise the end form content will make up for it. If you have any questions or concerns, please contact me at <strong>Mikael.Yamiosei@gmail.com</strong>.

  </blockquote>

