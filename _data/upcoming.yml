heading: IRCNA ON BREAK | JUNE 30TH - JULY 15TH
body: |-
  <h2>NOTICE: A Note from Mikael – IRCNA </h2>

  <blockquote style="border-left: 4px solid #e44; margin: 1.5em 0; padding: 0.8em 1.2em; background: #fafaf;">

  When I started IRCNA, I made a quiet promise to myself: only publish what I believe adds something real to Armenian civic life. Not noise. Not filler. Content that serves this community — with a focus on the Armenian youth, the generation I'm proud to be part of and to write for!!

  That means I will always choose quality over quantity, even if it means going quiet for a stretch while I work on something that matters.

  It also means being honest when I need to stop. I'm the only person behind IRCNA — every interview, every photo, every article, every post. And this June, I worked almost non‑stop. Through Wine Days, through the macro article, through everything you've seen go live. There were many nights with little to no sleep. I gave it everything I had, and I'm proud of what we published. But it came at a cost. Not just the typical monetary cost, but at the cost of my own health.

  So I'm taking a short break — from June 30th to July 15th — to rest, recover, and protect both my mental and physical health. I'll be stepping away from screens, from emails, from reporting. Just for a little while.

  The good news: my July schedule is already fully booked and carefully planned. You shouldn't experience any real disruption or delay in the content you've come to expect. I've set things up so that IRCNA keeps moving, just at a pace I can sustain.

  Thank you for reading, for supporting independent journalism, and for understanding that rest is part of the work — not a retreat from it.

  I'll see you back here soon!!

  — Mikael Yamiosei

  Founder, IRCNA

  </blockquote>
  For any Questions, Comments, or Concerns Please reach me via Email: Mikael.Yamiosei@gmail.com [NOTE: ALL EMAILS WILL BE REPLIED TO AFTER JULY 15TH]
