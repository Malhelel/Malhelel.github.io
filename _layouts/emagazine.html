
<!DOCTYPE HTML>
<html>
<head>
	<base href="/">
	<link rel="icon" type="image/png" href="/images/uploads/ircna-favicon.png">
	<title>{{ page.title }} – IRCNA</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<style>
		/* magazine‑specific overrides */
		#emagazine-wrapper {
			max-width: 100%;
			margin: 0;
			padding: 0;
		}
		#main {
			width: 100% !important;
		}
		#main > .inner {
			padding: 0 !important;
			max-width: 100%;
		}
		#sidebar {
			display: none !important;
		}
		.emagazine-header {
			padding: 4em 2em 2em;
			text-align: center;
			background: inherit;
		}
		.emagazine-header h1 {
			font-size: 3.5em;
			margin-bottom: 0.3em;
			color: #3d4449;
		}
		.emagazine-meta {
			font-size: 1em;
			color: #7f888f;
			font-family: "Roboto Slab", serif;
			text-transform: uppercase;
			letter-spacing: 0.075em;
		}
		/* Image stream */
		.emagazine-content {
			margin: 0;
			padding: 0;
			line-height: 0;
		}
		.emagazine-content img {
			display: block;
			width: 100%;
			height: auto;
			margin: 0;
			padding: 0;
		}
	</style>
	{% if page.background_color %}
	<style>
		body { background-color: {{ page.background_color }}; }
	</style>
	{% endif %}
</head>
<body class="is-preload">

{% include topnav.html %}

<div id="wrapper">
<div id="main">
<div class="inner">

	<article id="emagazine-wrapper">
		<header class="emagazine-header">
			<h1>{{ page.title }}</h1>
			<div class="emagazine-meta">
				{% if page.author %}<span>By {{ page.author }}</span>{% endif %}
				{% if page.date %}<span> · {{ page.date | date: "%B %d, %Y" }}</span>{% endif %}
			</div>
		</header>

		<div class="emagazine-content">
			{{ content }}
		</div>
	</article>

</div>
</div>
</div>

<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/browser.min.js"></script>
<script src="assets/js/breakpoints.min.js"></script>
<script src="assets/js/util.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
