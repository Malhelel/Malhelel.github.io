backend:
  name: github
  repo: Malhelel/Malhelel.github.io
  branch: main

media_folder: "images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "_data/homepage.yml"
        label: "Homepage"
        name: "home"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Sidebar Slogan", name: "sidebar_slogan", widget: "string" }
          - { label: "Logo Image", name: "logo_image", widget: "image" }
          - { label: "Banner Image", name: "banner_image", widget: "image" }
          - { label: "Intro Text", name: "intro_text", widget: "text" }
          - { label: "Learn More Button Text", name: "learn_more_text", widget: "string" }
          - { label: "Learn More Button URL", name: "learn_more_url", widget: "string" }
          - { label: "Mission Section Title", name: "mission_section_title", widget: "string" }
          - { label: "Mission 1 Title", name: "mission_1_title", widget: "string" }
          - { label: "Mission 1 Description", name: "mission_1_desc", widget: "text" }
          - { label: "Mission 2 Title", name: "mission_2_title", widget: "string" }
          - { label: "Mission 2 Description", name: "mission_2_desc", widget: "text" }
          - { label: "Mission 3 Title", name: "mission_3_title", widget: "string" }
          - { label: "Mission 3 Description", name: "mission_3_desc", widget: "text" }
          - { label: "Mission 4 Title", name: "mission_4_title", widget: "string" }
          - { label: "Mission 4 Description", name: "mission_4_desc", widget: "text" }
          - { label: "Posts Section Title", name: "posts_section_title", widget: "string" }
          - { label: "Post 1 Image", name: "post_1_image", widget: "image" }
          - { label: "Post 1 Title", name: "post_1_title", widget: "string" }
          - { label: "Post 1 Excerpt", name: "post_1_excerpt", widget: "text" }
          - { label: "Post 1 URL", name: "post_1_url", widget: "string" }
          - { label: "Post 2 Image", name: "post_2_image", widget: "image" }
          - { label: "Post 2 Title", name: "post_2_title", widget: "string" }
          - { label: "Post 2 Excerpt", name: "post_2_excerpt", widget: "text" }
          - { label: "Post 2 URL", name: "post_2_url", widget: "string" }
          - { label: "Post 3 Image", name: "post_3_image", widget: "image" }
          - { label: "Post 3 Title", name: "post_3_title", widget: "string" }
          - { label: "Post 3 Excerpt", name: "post_3_excerpt", widget: "text" }
          - { label: "Post 3 URL", name: "post_3_url", widget: "string" }
          - { label: "Post 4 Image", name: "post_4_image", widget: "image" }
          - { label: "Post 4 Title", name: "post_4_title", widget: "string" }
          - { label: "Post 4 Excerpt", name: "post_4_excerpt", widget: "text" }
          - { label: "Post 4 URL", name: "post_4_url", widget: "string" }
          - { label: "Post 5 Image", name: "post_5_image", widget: "image" }
          - { label: "Post 5 Title", name: "post_5_title", widget: "string" }
          - { label: "Post 5 Excerpt", name: "post_5_excerpt", widget: "text" }
          - { label: "Post 5 URL", name: "post_5_url", widget: "string" }
          - { label: "Post 6 Image", name: "post_6_image", widget: "image" }
          - { label: "Post 6 Title", name: "post_6_title", widget: "string" }
          - { label: "Post 6 Excerpt", name: "post_6_excerpt", widget: "text" }
          - { label: "Post 6 URL", name: "post_6_url", widget: "string" }
          - { label: "Sidebar About Title", name: "sidebar_about_title", widget: "string" }
          - { label: "Sidebar Mini 1 Image", name: "sidebar_mini_1_image", widget: "image" }
          - { label: "Sidebar Mini 1 Text", name: "sidebar_mini_1_text", widget: "text" }
          - { label: "Sidebar Mini 2 Image", name: "sidebar_mini_2_image", widget: "image" }
          - { label: "Sidebar Mini 2 Text", name: "sidebar_mini_2_text", widget: "text" }
          - { label: "Sidebar Mini 3 Image", name: "sidebar_mini_3_image", widget: "image" }
          - { label: "Sidebar Mini 3 Text", name: "sidebar_mini_3_text", widget: "text" }
          - { label: "Contact Section Title", name: "contact_section_title", widget: "string" }
          - { label: "Contact Description", name: "contact_desc", widget: "text" }
          - { label: "Contact Email", name: "contact_email", widget: "string" }
          - { label: "Contact Phone", name: "contact_phone", widget: "string" }
          - { label: "Contact Address Line 1", name: "contact_address_line1", widget: "string" }
          - { label: "Contact Address Line 2", name: "contact_address_line2", widget: "string" }
          - { label: "Footer Text", name: "footer_text", widget: "text" }
          - { label: "Sidebar Menu HTML", name: "menu_html", widget: "markdown" }
          - { label: "Social Icons HTML", name: "social_icons_html", widget: "markdown" }
      - file: "_data/disclaimer.yml"
        label: "Disclaimer"
        name: "disclaimer"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "_data/contact.yml"
        label: "Contact"
        name: "contact"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
      - file: "_data/gallery.yml"
        label: "Gallery"
        name: "gallery"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
          - name: "items"
            label: "Gallery Items"
            widget: "list"
            fields:
              - { label: "Category", name: "category", widget: "select", options: ["Events", "Protests", "Daily Life", "Culture", "Politics", "Other"] }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Description", name: "description", widget: "text" }
      - file: "_data/stories.yml"
        label: "Stories"
        name: "stories"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
      - file: "_data/mini_posts.yml"
        label: "Mini Posts"
        name: "mini_posts"
        fields:
          - name: "posts"
            label: "Mini Posts"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - name: "images"
                label: "Media Items"
                widget: "list"
                collapsed: true
                summary: "{{filename}}"
                fields:
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Media Type", name: "type", widget: "select", options: ["image", "video"], default: "image" }
                  - { label: "Video URL", name: "video_url", widget: "string", required: false }
      - file: "_data/events.yml"
        label: "Events"
        name: "events"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "markdown" }
          - name: "items"
            label: "Items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
              - name: "images"
                label: "Images"
                widget: "list"
                collapsed: true
                summary: "{{filename}}"
                fields:
                  - { label: "Image", name: "image", widget: "image" }
      - file: "_data/local-stories.yml"
        label: "Local Stories"
        name: "local_stories"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "markdown" }
          - name: "items"
            label: "Items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
      - file: "_data/breaking-news.yml"
        label: "Breaking News"
        name: "breaking_news"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "markdown" }
          - name: "items"
            label: "Items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
      - file: "_data/politics.yml"
        label: "Politics"
        name: "politics"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "markdown" }
          - name: "items"
            label: "Items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
      - file: "_data/independent-journalist.yml"
        label: "Independent Journalists"
        name: "independent_journalist"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "markdown" }
          - name: "items"
            label: "Items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
              - { label: "Anchor", name: "anchor", widget: "string", required: false, hint: "Unique ID for linking (e.g., mikael-yamiosei)" }
      - file: "_data/community-connections.yml"
        label: "Community Connections"
        name: "community_connections"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "markdown" }
          - name: "items"
            label: "Items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
      - file: "_data/content-removal.yml"
        label: "Content Removal"
        name: "content_removal"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "_data/submit-events.yml"
        label: "Submit Events"
        name: "submit_events"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "_data/policies.yml"
        label: "Policies"
        name: "policies"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "_data/legal.yml"
        label: "Legal"
        name: "legal"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "_data/about.yml"
        label: "About"
        name: "about"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "_data/upcoming.yml"
        label: "Upcoming Popup"
        name: "upcoming"
        fields:
          - { label: "Enable Popup", name: "enabled", widget: "boolean", default: true }
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "_data/stats.yml"
        label: "Site Stats"
        name: "stats"
        fields:
          - { label: "Heading (optional)", name: "heading", widget: "string", required: false }
          - { label: "Image (optional)", name: "image", widget: "image", required: false }
          - { label: "Visitors", name: "visitors", widget: "number", default: 0 }
          - { label: "Subscribers", name: "subscribers", widget: "number", default: 0 }
      - file: "_data/newsletter.yml"
        label: "Newsletter"
        name: "newsletter"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Poster Image", name: "image", widget: "image" }
          - { label: "Sign‑up Link", name: "link", widget: "string" }
          - { label: "Image Alt Text", name: "alt_text", widget: "string" }
      - file: "_data/subscribers.yml"
        label: "Subscribers"
        name: "subscribers"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Message", name: "message", widget: "text" }
      - file: "_data/journalists.yml"
        label: "Journalists Map"
        name: "journalists_map"
        fields:
          - { label: "Map Image", name: "map_image", widget: "image", required: false, hint: "Single clickable map image" }
          - name: "journalists"
            label: "Journalists"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Bio", name: "bio", widget: "text" }
              - { label: "City", name: "city", widget: "string" }
              - { label: "Latitude", name: "lat", widget: "number", value_type: "float" }
              - { label: "Longitude", name: "lng", widget: "number", value_type: "float" }
              - { label: "Anchor", name: "anchor", widget: "string", required: false, hint: "Unique ID for linking (e.g., mikael-yamiosei)" }
      - file: "_data/featurette.yml"
        label: "Featurette"
        name: "featurette"
        fields:
          - name: "items"
            label: "Featurette Items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Background Image", name: "background_image", widget: "image" }
              - { label: "Overlap Image 1", name: "img1", widget: "image" }
              - { label: "Overlap Image 2", name: "img2", widget: "image" }
              - { label: "Overlap Image 3", name: "img3", widget: "image" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", hint: "Where clicking takes you" }
      - file: "_data/connect.yml"
        label: "Connect"
        name: "connect"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Intro / Rules", name: "intro", widget: "markdown" }
          - { label: "Tally Embed Code", name: "embed_code", widget: "markdown", hint: "Paste the full Tally iframe code here" }
      # ----- NEW COMMUNITY COLLECTIONS -----
      - file: "_data/community_student.yml"
        label: "Community – Student"
        name: "community_student"
        fields:
          - name: "items"
            label: "Opportunities"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
      - file: "_data/community_internship.yml"
        label: "Community – Internship"
        name: "community_internship"
        fields:
          - name: "items"
            label: "Opportunities"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
      - file: "_data/community_volunteering.yml"
        label: "Community – Volunteering"
        name: "community_volunteering"
        fields:
          - name: "items"
            label: "Opportunities"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
      - file: "_data/community_sports.yml"
        label: "Community – Sports"
        name: "community_sports"
        fields:
          - name: "items"
            label: "Opportunities"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
      - file: "_data/community_language_club.yml"
        label: "Community – Language Club"
        name: "community_language_club"
        fields:
          - name: "items"
            label: "Opportunities"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
      - file: "_data/community_community.yml"
        label: "Community – Community"
        name: "community_community"
        fields:
          - name: "items"
            label: "Opportunities"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
      - file: "_data/community_religious_gathering.yml"
        label: "Community – Religious Gathering"
        name: "community_religious_gathering"
        fields:
          - name: "items"
            label: "Opportunities"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
      - file: "_data/topnav.yml"
        label: "Top Navigation"
        name: "topnav"
        fields:
          - name: "links"
            label: "Menu Links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
  - name: "posts"
    label: "Articles"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", pattern: ['^".*"$', "Title must be enclosed in double quotes, e.g. \"My Title: Story\""] }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image (optional)", name: "image", widget: "image", required: false }
      - { label: "Background Colour", name: "background_color", widget: "string", required: false, hint: "e.g. #f5f5f5 or lightblue" }
      - { label: "Text Colour", name: "text_color", widget: "string", required: false, hint: "e.g. #333333 or darkred" }
      - { label: "Custom CSS", name: "custom_css", widget: "text", required: false, hint: "Any additional CSS for this article" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
  - name: "emagazines"
    label: "Emagazines"
    folder: "_emagazines"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", pattern: ['^".*"$', "Title must be enclosed in double quotes, e.g. \"My Title: Story\""] }
      - { label: "Author", name: "author", widget: "string", default: "Mikael Yamiosei" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Background Colour", name: "background_color", widget: "string", required: false, hint: "e.g. #f5f5f5 or lightblue" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "emagazine" }
