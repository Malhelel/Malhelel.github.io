name: One‑Time Gallery Migration

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate structured gallery data
        run: |
          echo "heading: IRCNA Gallery" > _data/gallery.yml
          echo "intro: Images from the field, events, and community submissions, organized by category." >> _data/gallery.yml
          echo "items:" >> _data/gallery.yml
          for img in images/uploads/*.{jpg,jpeg,png,gif,webp}; do
            [ -f "$img" ] || continue
            filename=$(basename "$img")
            echo "  - category: Uncategorized" >> _data/gallery.yml
            echo "    title: \"$filename\"" >> _data/gallery.yml
            echo "    image: /$img" >> _data/gallery.yml
            echo "    description: \"\"" >> _data/gallery.yml
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/gallery.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Migrate existing images to structured gallery"
            git push
          fi
